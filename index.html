<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maison Kimouzz - Produits de Mayotte</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}

body{
font-family:'Poppins',sans-serif;
background:#081420;
color:white;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#ffb70355,transparent 30%),
radial-gradient(circle at bottom right,#fb850055,transparent 30%);
z-index:-1;
}

header{
position:fixed;
top:0;
width:100%;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo-area{display:flex;gap:10px;align-items:center;}
.logo{width:60px;height:60px;border-radius:15px;object-fit:cover;}

nav a{color:white;margin:0 10px;text-decoration:none;}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:100px 20px;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1200');
background-size:cover;
background-position:center;
}

.section{padding:80px 20px;max-width:1100px;margin:auto;}
.section-title{text-align:center;font-size:38px;margin-bottom:20px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
}

.card img{width:100%;height:200px;object-fit:cover;}

.card-content{padding:15px;}

.price{
color:#ffdd00;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

button{
padding:10px;
width:100%;
border:none;
background:linear-gradient(90deg,#ffdd00,#ff7b00);
font-weight:bold;
cursor:pointer;
border-radius:10px;
}

/* CART */
.cart{
position:fixed;
right:15px;
bottom:15px;
width:300px;
background:rgba(0,0,0,0.85);
padding:15px;
border-radius:15px;
max-height:80vh;
overflow:auto;
}

.total{color:#ffdd00;margin-top:10px;font-weight:bold;}

/* ORDERS */
.orders{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<div class="logo-area">
<img class="logo" src="https://images.unsplash.com/photo-1606787366850-de6330128bfc?q=80&w=300">
<h3>Maison Kimouzz</h3>
</div>

<nav>
<a href="#products">Produits</a>
<a href="#avis">Avis</a>
<a href="#orders">Commandes</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h2>Saveurs de Mayotte</h2>
<p>Produits frais et locaux</p>
</div>
</section>

<!-- PRODUITS -->
<section class="section" id="products">

<h2 class="section-title">Nos Produits</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1603833665858-e61d17a86224">
<div class="card-content">
<h3>Banane verte</h3>
<div class="price">20€ / régime</div>
<button onclick="add('Banane verte',20)">Ajouter</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587486913049-53fc88980cfc">
<div class="card-content">
<h3>Œufs</h3>
<div class="price">8€</div>
<button onclick="add('Œufs',8)">Ajouter</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30">
<div class="card-content">
<h3>Poule</h3>
<div class="price">10€</div>
<button onclick="add('Poule',10)">Ajouter</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1474511320723-9a56873867b5">
<div class="card-content">
<h3>Canard</h3>
<div class="price">35€</div>
<button onclick="add('Canard',35)">Ajouter</button>
</div>
</div>

</div>
</section>

<!-- PANIER -->
<div class="cart">
<h3>🛒 Panier</h3>
<div id="cart"></div>

<div class="total">
Total: <span id="total">0</span>€
</div>

<button onclick="checkout()">Commander</button>
<button onclick="facture()">Facture PDF</button>

<p style="color:#ccc;font-size:12px;text-align:center;">
💳 Carte bancaire bientôt disponible (Stripe)
</p>
</div>

<!-- COMMANDES -->
<section class="section" id="orders">
<h2 class="section-title">📦 Commandes</h2>
<div id="ordersList"></div>
</section>

<script>

let cart=[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];

function add(n,p){
cart.push({name:n,price:p});
renderCart();
}

function renderCart(){
let c=document.getElementById("cart");
c.innerHTML="";
let t=0;

cart.forEach(i=>{
t+=i.price;
c.innerHTML+=`<div>${i.name} - ${i.price}€</div>`;
});

document.getElementById("total").innerText=t;
}

function saveOrder(total){
orders.push({cart,total,date:new Date().toLocaleString()});
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

function renderOrders(){
let box=document.getElementById("ordersList");
box.innerHTML="";

orders.forEach((o,i)=>{
box.innerHTML+=`
<div class="orders">
<h3>Commande #${i+1}</h3>
<p>${o.date}</p>
<p><b>${o.total}€</b></p>
</div>`;
});
}

function checkout(){

if(cart.length===0)return;

let total=cart.reduce((a,b)=>a+b.price,0);

let msg="🛒 Commande Maison Kimouzz%0A%0A";

cart.forEach(i=>{
msg+="- "+i.name+" "+i.price+"€%0A";
});

msg+="%0ATotal:"+total+"€";

saveOrder(total);

// WhatsApp
window.open("https://wa.me/33789583650?text="+msg,"_blank");

// Email
window.location.href="mailto:maisonkimouzz@gmail.com?subject=Commande&body="+msg;

cart=[];
renderCart();
}

function facture(){

let total=cart.reduce((a,b)=>a+b.price,0);

let w=window.open("");
w.document.write("<h1>Facture Maison Kimouzz</h1>");

cart.forEach(i=>{
w.document.write("<p>"+i.name+" - "+i.price+"€</p>");
});

w.document.write("<h2>Total: "+total+"€</h2>");
w.print();
}

renderOrders();

</script>

</body>
</html>
