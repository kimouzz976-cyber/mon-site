<!-- REMPLACE TON ANCIEN CODE PRODUIT PAR CELUI-CI -->

<div class="products" id="products"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

/* PRODUITS */
const products = [

  {
    name:"Banane",
    price:20,
    icon:"🍌",
    stock:"En stock",
    badge:"🔥 Populaire"
  },

  {
    name:"Œufs",
    price:8,
    icon:"🥚",
    stock:"Disponible",
    badge:"⭐ Fermier"
  },

  {
    name:"Poule",
    price:10,
    icon:"🐔",
    stock:"Disponible",
    badge:"🌿 Local"
  },

  {
    name:"Canard",
    price:35,
    icon:"🦆",
    stock:"Stock limité",
    badge:"🔥 Premium"
  }

];

/* PANIER */
let cart =
  JSON.parse(localStorage.getItem("cart"))
  || [];

/* SAVE */
function save(){

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );
}

/* TOAST */
function toast(text){

  let t =
    document.getElementById("toast");

  t.innerText=text;

  t.style.display="block";

  setTimeout(()=>{

    t.style.display="none";

  },2000);
}

/* STATUS */
function showStatus(
  text,
  color="#16a34a"
){

  let s =
    document.getElementById("status");

  s.style.color=color;

  s.innerText=text;

  setTimeout(()=>{

    s.innerText="";

  },3000);
}

/* AJOUT */
function add(name,price){

  let found =
    cart.find(i=>i.name===name);

  if(found){

    found.qty++;

  }else{

    cart.push({
      name,
      price,
      qty:1
    });
  }

  save();

  renderCart();

  toast("✅ Produit ajouté");

  showStatus("✔ Produit ajouté");
}

/* + */
function increase(i){

  cart[i].qty++;

  save();

  renderCart();
}

/* - */
function decrease(i){

  cart[i].qty--;

  if(cart[i].qty<=0){

    cart.splice(i,1);
  }

  save();

  renderCart();
}

/* MESSAGE LIVRAISON */
function getDeliveryMessage(total){

  if(total>=70){

    return "🚚 Livraison gratuite activée";

  }else{

    return "📍 Retrait obligatoire à Chiconi";
  }
}

/* PRODUITS */
function renderProducts(){

  let box =
    document.getElementById("products");

  let search =
    document
    .getElementById("search")
    .value
    .toLowerCase();

  box.innerHTML="";

  products

  .filter(p=>
    p.name
    .toLowerCase()
    .includes(search)
  )

  .forEach(p=>{

    box.innerHTML += `

      <div class="card">

        <div class="product-badge">
          ${p.badge}
        </div>

        <div class="product-circle">
          ${p.icon}
        </div>

        <h3>${p.name}</h3>

        <div class="product-stock">
          ${p.stock}
        </div>

        <div class="price">
          ${p.price}€
        </div>

        <button
          class="add-btn"
          onclick="add('${p.name}',${p.price})"
        >
          Ajouter au panier
        </button>

      </div>

    `;
  });
}

/* PANIER */
function renderCart(){

  let box =
    document.getElementById("cart");

  let total=0;

  let count=0;

  box.innerHTML="";

  if(cart.length===0){

    box.innerHTML=`
      <p>🛒 Panier vide</p>
    `;

    document
    .getElementById("total")
    .innerText=0;

    document
    .getElementById("count")
    .innerText=0;

    return;
  }

  cart.forEach((i,index)=>{

    total += i.price*i.qty;

    count += i.qty;

    box.innerHTML += `

      <div class="item">

        <div>

          <div class="item-name">
            ${i.name}
          </div>

          <small>
            ${i.price}€ x ${i.qty}
          </small>

        </div>

        <div class="qty">

          <button
            onclick="decrease(${index})"
          >
            -
          </button>

          <span>${i.qty}</span>

          <button
            onclick="increase(${index})"
          >
            +
          </button>

        </div>

      </div>

    `;
  });

  document
  .getElementById("total")
  .innerText=total;

  document
  .getElementById("count")
  .innerText=count;

  document
  .getElementById("deliveryInfo")
  .innerHTML =
    getDeliveryMessage(total);
}

/* CLEAR */
function clearCart(){

  cart=[];

  save();

  renderCart();

  toast("🗑 Panier vidé");

  showStatus(
    "Panier vidé",
    "#ef4444"
  );
}

/* TOGGLE CART */
function toggleCart(){

  let c =
    document.getElementById("cartBox");

  c.style.display =

    c.style.display==="block"

    ? "none"

    : "block";
}

/* FERMER PANIER */
window.onclick=function(e){

  let cart =
    document.getElementById("cartBox");

  let btn =
    document.querySelector(".cart-btn");

  if(

    e.target!==cart &&

    !cart.contains(e.target) &&

    e.target!==btn

  ){

    cart.style.display="none";
  }
}

/* WHATSAPP */
function orderWhatsApp(){

  if(cart.length===0){

    return alert("Panier vide");
  }

  let name =
    document
    .getElementById("clientName")
    .value;

  let address =
    document
    .getElementById("clientAddress")
    .value;

  if(!name || !address){

    return alert(
      "Nom + adresse requis"
    );
  }

  let total=0;

  let msg=
`🛒 Maison Kimouzz

👤 ${name}
📍 ${address}

`;

  cart.forEach(i=>{

    msg +=
`- ${i.name} x${i.qty}
`;

    total += i.price*i.qty;
  });

  msg += `
💰 Total : ${total}€
`;

  msg += `
${getDeliveryMessage(total)}
`;

  window.open(
    "https://wa.me/33789583650?text="
    + encodeURIComponent(msg)
  );

  cart=[];

  save();

  renderCart();

  toast("✅ Commande envoyée");

  showStatus("Commande envoyée");
}

/* EMAIL */
function orderEmail(){

  let total=0;

  let body=
"Commande Maison Kimouzz\n\n";

  cart.forEach(i=>{

    body +=
`${i.name} x${i.qty}\n`;

    total += i.price*i.qty;
  });

  body += `
Total : ${total}€
`;

  window.location.href=
  "mailto:maisonkimouzzz@gmail.com?subject=Commande Maison Kimouzz&body="
  + encodeURIComponent(body);
}

/* INIT */
renderProducts();

renderCart();

</script>
