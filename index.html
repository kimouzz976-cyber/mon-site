<section id="contact" style="
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
color:white;
font-family:Arial,sans-serif;
">

<div style="
width:100%;
max-width:700px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
">

<h2 style="
font-size:42px;
text-align:center;
margin-bottom:10px;
color:#ffffff;
">
Contactez Maison Kimouzzz
</h2>

<p style="
text-align:center;
margin-bottom:35px;
color:#dbeafe;
font-size:18px;
">
Produits locaux de Mayotte 🇾🇹  
Livraison • Informations • Commandes
</p>

<form>

<input type="text" placeholder="Votre nom" style="
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:16px;
outline:none;
">

<input type="email" placeholder="Votre email" style="
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
border-radius:15px;
font-size:16px;
outline:none;
">

<textarea placeholder="Votre message..." style="
width:100%;
height:180px;
padding:18px;
border:none;
border-radius:15px;
font-size:16px;
resize:none;
outline:none;
margin-bottom:25px;
"></textarea>

<button type="submit" style="
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#3b82f6;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
">
Envoyer le message
</button>

</form>

</div>
</section>
