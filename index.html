<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Kimouzz - Tropical Market Pro</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background: linear-gradient(180deg,#ffb703,#fb8500,#023047);
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:1000;
  padding:15px;
  text-align:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
  background:rgba(0,0,0,0.25);
}
.hero h1{font-size:40px;margin:0;}
.hero p{color:#ffe8a3;font-size:18px;}
.hero button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#25D366;
  font-weight:bold;
  cursor:pointer;
}

/* SEARCH */
.search{
  text-align:center;
  margin-top:15px;
}
.search input{
  width:80%;
  max-width:400px;
  padding:10px;
  border-radius:20px;
  border:none;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:25px;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:18px;
  text-align:center;
  transition:0.3s;
}
.card:hover{transform:translateY(-8px);}

.icon{font-size:50px;}
.price{color:#ffe066;font-weight:bold;}

.card button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ffdd00,#ff7b00);
  cursor:pointer;
}

/* CART */
.cart-btn{
  position:fixed;
  right:15px;
  top:80px;
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
  z-index:2000;
}

.cart{
  position:fixed;
  right:15px;
  top:130px;
  width:300px;
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:15px;
  max-height:70vh;
  overflow:auto;
  display:none;
}

.item{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin:5px 0;
}

.total{color:#ffe066;font-weight:bold;margin-top:10px;}

.order-btn,.clear-btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.order-btn{background:#25D366;}
.clear-btn{background:#ff3b3b;color:white;}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  padding:10px 15px;
  border-radius:20px;
  display:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  margin-top:40px;
  background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<header>🌴 Maison Kimouzz - Tropical Market Pro</header>

<div class="hero">
  <h1>🥭 Saveurs de Mayotte</h1>
  <p>Produits frais • locaux • livraison rapide 🚚</p>
</div>

<div class="search">
  <input id="search" placeholder="🔎 Rechercher..." oninput="renderProducts()">
</div>

<button class="cart-btn" onclick="toggleCart()">🧺 Panier (<span id="count">0</span>)</button>

<div class="cart" id="cartBox">
  <div id="cart"></div>
  <div class="total">Total : <span id="total">0</span>€</div>
  <button class="order-btn" onclick="order()">Commander WhatsApp</button>
  <button class="clear-btn" onclick="clearCart()">Vider</button>
</div>

<div class="products" id="products"></div>

<div class="toast" id="toast"></div>

<footer>
  <h2>Maison Kimouzz</h2>
  <p>📍 281 route Ampadza, 97670 Chiconi</p>
  <p>📩 maisonkimouzz@gmail.com</p>
  <p>📞 0789583650</p>
</footer>

<script>

const products = [
  {name:"Banane", price:20, icon:"🍌"},
  {name:"Œufs", price:8, icon:"🥚"},
  {name:"Poulet", price:10, icon:"🍗"},
  {name:"Canard", price:35, icon:"🦆"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

function renderProducts(){
  let search = document.getElementById("search").value.toLowerCase();
  let box = document.getElementById("products");

  box.innerHTML = "";

  products
  .filter(p => p.name.toLowerCase().includes(search))
  .forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <div class="icon">${p.icon}</div>
        <h3>${p.name}</h3>
        <div class="price">${p.price}€</div>
        <button onclick="add('${p.name}',${p.price})">Ajouter</button>
      </div>
    `;
  });
}

function add(name,price){
  let item = cart.find(i=>i.name===name);
  if(item) item.qty++;
  else cart.push({name,price,qty:1});

  save();
  renderCart();
  toast(name + " ajouté 🛒");
}

function renderCart(){
  let box = document.getElementById("cart");
  let total = 0;
  let count = 0;

  box.innerHTML = "";

  cart.forEach((i,index)=>{
    total += i.price * i.qty;
    count += i.qty;

    box.innerHTML += `
      <div class="item">
        ${i.name} x${i.qty}
        <span onclick="removeItem(${index})" style="color:red;cursor:pointer">x</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("count").innerText = count;
}

function removeItem(i){
  cart.splice(i,1);
  save();
  renderCart();
}

function clearCart(){
  cart = [];
  save();
  renderCart();
}

function toggleCart(){
  let c = document.getElementById("cartBox");
  c.style.display = c.style.display==="block" ? "none" : "block";
}

function order(){
  if(cart.length===0) return;

  let msg = "🛒 Commande Maison Kimouzz\n\n";
  let total = 0;

  cart.forEach(i=>{
    msg += `- ${i.name} x${i.qty} : ${i.price*i.qty}€\n`;
    total += i.price*i.qty;
  });

  msg += `\n💰 Total : ${total.toFixed(2)}€`;

  window.open("https://wa.me/33789583650?text="+encodeURIComponent(msg));
}

renderProducts();
renderCart();

</script>

</body>
</html>
