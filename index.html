<section id="boutique" style="padding:50px; background:#f4f6f8; font-family:Arial;">

  <h2 style="text-align:center;">🛒 Boutique Maison Kimouzz</h2>

  <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin-top:30px;">

    <!-- PRODUIT 1 -->
    <div style="width:250px; background:white; padding:15px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;">
      <h3>🍌 Banane</h3>
      <p>À partir de <strong>20€</strong></p>
      <button onclick="commander('Banane', '20€')" style="padding:10px; background:green; color:white; border:none; border-radius:8px; cursor:pointer;">
        Commander
      </button>
    </div>

    <!-- PRODUIT 2 -->
    <div style="width:250px; background:white; padding:15px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;">
      <h3>🥚 Œufs</h3>
      <p>9€ le plateau</p>
      <button onclick="commander('Œufs', '9€')" style="padding:10px; background:green; color:white; border:none; border-radius:8px; cursor:pointer;">
        Commander
      </button>
    </div>

    <!-- PRODUIT 3 -->
    <div style="width:250px; background:white; padding:15px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;">
      <h3>🍗 Poulet</h3>
      <p>10€</p>
      <button onclick="commander('Poulet', '10€')" style="padding:10px; background:green; color:white; border:none; border-radius:8px; cursor:pointer;">
        Commander
      </button>
    </div>

    <!-- PRODUIT 4 -->
    <div style="width:250px; background:white; padding:15px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;">
      <h3>🦆 Canard</h3>
      <p>35€ / 40€ (déplumé)</p>
      <button onclick="commander('Canard', '35-40€')" style="padding:10px; background:green; color:white; border:none; border-radius:8px; cursor:pointer;">
        Commander
      </button>
    </div>

  </div>

</section>

<script>
function commander(produit, prix) {
    let numero = "270789583650"; // numéro WhatsApp (format international)
    let message = "Bonjour, je souhaite commander : " + produit + " (" + prix + ")";
    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}
</script>
