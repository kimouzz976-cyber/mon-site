<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Kimouzz - Pro Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#081420;color:white;}

/* HEADER */
header{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
align-items:center;padding:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo-area{display:flex;gap:10px;align-items:center}
.logo{width:50px;height:50px;border-radius:12px}

/* HERO */
.hero{
height:90vh;display:flex;
justify-content:center;align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1542838132-92c53300491e') center/cover;
}

/* PRODUCTS */
.section{padding:100px 20px;max-width:1100px;margin:auto;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}

.card{
background:rgba(255,255,255,0.08);
border-radius:15px;
padding:10px;
}

.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}

.price{color:#ffdd00;font-weight:bold}

button{
padding:8px;border:none;width:100%;
margin-top:5px;
cursor:pointer;
border-radius:8px;
background:linear-gradient(90deg,#ffdd00,#ff7b00);
font-weight:bold;
}

/* CART */
.cart{
position:fixed;right:10px;bottom:10px;
width:320px;background:rgba(0,0,0,0.9);
padding:15px;border-radius:15px;
z-index:2000;
}

.cart-item{
display:flex;justify-content:space-between;
font-size:14px;margin:5px 0;
}

.total{color:#ffdd00;font-weight:bold}

/* ADMIN PANEL */
#adminPanel{
display:none;
position:fixed;
top:80px;right:10px;
background:#000;
padding:15px;
border-radius:10px;
width:260px;
z-index:3000;
}

#adminPanel input{
width:100%;
margin:5px 0;
padding:6px;
}

/* POPUP EDIT */
#popup{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:12px;
z-index:5000;
width:300px;
}

#popup input{
width:100%;
margin:5px 0;
padding:6px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#00c853;
color:white;
padding:10px 20px;
border-radius:10px;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<header>
<div class="logo-area">
<img class="logo" src="https://images.unsplash.com/photo-1606787366850-de6330128bfc">
<h3>Maison Kimouzz</h3>
</div>

<button onclick="loginAdmin()">Admin</button>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Produits de Mayotte</h1>
<p>Frais • Local • Authentique</p>
</div>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Produits</h2>
<div class="products" id="productList"></div>
</section>

<!-- CART -->
<div class="cart">
<h3>🛒 Panier</h3>
<div id="cartList"></div>
<div class="total">Total: <span id="total">0</span>€</div>
<button onclick="checkout()">Commander</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Admin</h3>

<input id="name" placeholder="Nom">
<input id="price" placeholder="Prix">
<input id="img" placeholder="Image">
<input id="stock" placeholder="Stock">

<button onclick="addProduct()">Ajouter</button>
</div>

<!-- POPUP EDIT -->
<div id="popup">
<h3>Modifier produit</h3>
<input id="editName">
<input id="editPrice">
<input id="editImg">
<input id="editStock">
<button onclick="saveEdit()">Sauvegarder</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

let isAdmin=false;
let editIndex=null;

/* DATA */
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Banane verte",price:20,stock:10,img:"https://images.unsplash.com/photo-1603833665858-e61d17a86224"},
{name:"Œufs",price:8,stock:20,img:"https://images.unsplash.com/photo-1587486913049-53fc88980cfc"}
];

let cart=[];

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
}

/* LOGIN ADMIN */
function loginAdmin(){
let pass=prompt("Mot de passe ?");
if(pass==="1234"){
isAdmin=true;
document.getElementById("adminPanel").style.display="block";
toast("Accès admin OK");
}else{
toast("Erreur mot de passe");
}
}

/* TOAST */
function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* PRODUCTS */
function renderProducts(){
let box=document.getElementById("productList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">${p.price}€</div>
<p>Stock: ${p.stock}</p>

<button onclick="add(${i})">Ajouter</button>

${isAdmin?`
<button onclick="openEdit(${i})" style="background:#2196f3;">✏ Modifier</button>
<button onclick="del(${i})" style="background:red;color:white;">❌ Supprimer</button>
`:``}

</div>`;
});
}

/* ADD PRODUCT */
function addProduct(){

let name=nameInput().value;
let price=parseFloat(priceInput().value);
let img=imgInput().value;
let stock=parseInt(stockInput().value);

if(!name||!price||!img||!stock){
toast("Remplis tout !");
return;
}

products.push({name,price,img,stock});
save();
renderProducts();
toast("Produit ajouté !");
}

/* INPUT SHORTCUT */
const nameInput=()=>document.getElementById("name");
const priceInput=()=>document.getElementById("price");
const imgInput=()=>document.getElementById("img");
const stockInput=()=>document.getElementById("stock");

/* DELETE */
function del(i){
products.splice(i,1);
save();
renderProducts();
toast("Produit supprimé");
}

/* EDIT */
function openEdit(i){
editIndex=i;

document.getElementById("popup").style.display="block";

document.getElementById("editName").value=products[i].name;
document.getElementById("editPrice").value=products[i].price;
document.getElementById("editImg").value=products[i].img;
document.getElementById("editStock").value=products[i].stock;
}

function saveEdit(){
products[editIndex]={
name:editName.value,
price:parseFloat(editPrice.value),
img:editImg.value,
stock:parseInt(editStock.value)
};

save();
renderProducts();
document.getElementById("popup").style.display="none";
toast("Produit modifié");
}

/* CART */
function add(i){
if(products[i].stock<=0){
toast("Rupture stock");
return;
}

products[i].stock--;

cart.push({...products[i],qty:1});

save();
renderProducts();
renderCart();
}

function renderCart(){
let box=document.getElementById("cartList");
box.innerHTML="";
let total=0;

cart.forEach(c=>{
total+=c.price;
box.innerHTML+=`
<div class="cart-item">
<span>${c.name}</span>
<span>${c.price}€</span>
</div>`;
});

document.getElementById("total").innerText=total;
}

/* CHECKOUT */
function checkout(){
toast("Commande envoyée");
cart=[];
renderCart();
}

renderProducts();
renderCart();

</script>

</body>
</html>
