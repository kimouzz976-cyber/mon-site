<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Maison Kimouzzz</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .box h2 {
      margin-bottom: 15px;
      font-size: 20px;
    }

    .box p {
      margin: 8px 0;
    }

    form input,
    form textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
    }

    form textarea {
      height: 120px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .whatsapp {
      display: block;
      text-align: center;
      margin-top: 20px;
      background: #22c55e;
      padding: 12px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      background: #1e293b;
    }
  </style>
</head>

<body>

<header>
  <h1>Contact - Maison Kimouzzz</h1>
</header>

<div class="container">

  <div class="box">
    <h2>📍 Informations</h2>
    <p>Adresse : 281 route Ampadza</p>
    <p>97670 Chiconi, Mayotte</p>
    <p>📞 07 89 58 36 50</p>
    <p>📧 maisonkimouzzz@gmail.com</p>

    <a class="whatsapp" href="https://wa.me/262789583650" target="_blank">
      💬 Contacter sur WhatsApp
    </a>
  </div>

  <div class="box">
    <h2>✉️ Envoyer un message</h2>

    <form>
      <input type="text" placeholder="Votre nom" required>
      <input type="email" placeholder="Votre email" required>
      <textarea placeholder="Votre message" required></textarea>
      <button type="submit">Envoyer</button>
    </form>
  </div>

</div>

<footer>
  © 2026 Maison Kimouzzz - Tous droits réservés
</footer>

</body>
</html>
